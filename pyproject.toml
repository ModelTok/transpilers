[project]
name = "transpilers"
version = "0.0.1"
description = "Hybrid algorithmic + LLM source-to-source transpiler. N-to-M across Fortran/C/C++/VB/Python and Rust/Zig/C/Mojo."
requires-python = ">=3.11"
dependencies = [
    "libcst>=1.5",
    "anthropic>=0.40",
    "tree-sitter>=0.23",
]

[project.scripts]
transpile = "transpilers.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/transpilers"]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.7",
]
