# Debug run: minimal epochs, logging_steps=1, preprocessing_num_workers=0
# Same attention/GC fixes as phase1.

### model
model_name_or_path: Qwen/Qwen2.5-Coder-3B-Instruct
trust_remote_code: true

### attention fix
flash_attn: disabled
use_unsloth_gc: true
use_reentrant_gc: false

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: /home/bart/Github/transpilers/data/sft/cpp_mojo
dataset: mojo_acquisition
template: qwen
cutoff_len: 4096
overwrite_cache: false
preprocessing_num_workers: 1

### output
output_dir: /home/bart/Github/transpilers/data/sft/cpp_mojo/adapter_3b_debug
logging_steps: 1
save_strategy: epoch
plot_loss: false
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 1.5e-4
num_train_epochs: 0.1
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
dataloader_num_workers: 0
