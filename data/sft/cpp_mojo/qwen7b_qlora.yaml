# Qwen2.5-Coder-7B QLoRA (4-bit) — C++/Python -> Mojo, on the 12 GB RX 7700 XT.
# 7B bf16 weights (~14 GB) don't fit; 4-bit QLoRA (~4 GB) + grad checkpointing does.
# bitsandbytes 0.49.2 4-bit verified working on this ROCm setup.
model_name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct
trust_remote_code: true

### method (QLoRA)
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4
quantization_method: bnb
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: /mnt/c/Github/transpilers/data/sft/cpp_mojo
dataset: mojo_acquisition,cpp_mojo_translation
template: qwen
cutoff_len: 1024          # 12 GB ceiling: 2048 spiked activations past VRAM (HSA alloc fail @ step 25); 1024 fits
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: saves/Qwen2.5-Coder-7B-Instruct/lora/cpp_mojo_qlora_v1
logging_steps: 5
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true   # essential to fit activations in 12 GB
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
