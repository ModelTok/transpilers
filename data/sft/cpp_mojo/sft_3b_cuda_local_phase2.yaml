### model
model_name_or_path: Qwen/Qwen2.5-Coder-3B-Instruct
trust_remote_code: true
# Warm-start from Phase 1 adapter (teaches Mojo idioms first).
adapter_name_or_path: C:\Github\transpilers\out\adapter_3b_cuda_phase1
# Plain bf16 LoRA, fits 16GB.

### attention (NVIDIA Blackwell sm_120 — native SDPA)
flash_attn: sdpa
use_unsloth_gc: false
use_reentrant_gc: false

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: C:\Github\transpilers\data\sft\cpp_mojo
dataset: cpp_mojo_translation
template: qwen
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: C:\Github\transpilers\out\adapter_3b_cuda
logging_steps: 5
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 5e-5
num_train_epochs: 4.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
